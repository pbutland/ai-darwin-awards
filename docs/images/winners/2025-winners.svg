<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg-gradient" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop stop-color="#fdfdfd"/>
      <stop offset="1" stop-color="#f0f4f8"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" rx="40" fill="url(#bg-gradient)"/>

  <!-- Top Banner -->
  <text x="600" y="80" font-size="36" font-family="'Segoe UI', Arial, sans-serif" fill="#000" opacity="0.85" font-weight="500" text-anchor="middle" textLength="500" style="text-transform:uppercase;">AI DARWIN AWARDS</text>
  <text x="600" y="145" font-size="52" font-family="'Segoe UI', Arial, sans-serif" fill="#222" font-weight="bold" text-anchor="middle" textLength="500">Winners 2025</text>

  <!-- Vertical divider line -->
  <line x1="600" y1="120" x2="600" y2="630" stroke="#ddd" stroke-width="3"/>

  <!-- Sparkles (corners) -->
  <!-- Top left -->
  <g transform="translate(275,90) scale(0.8)">
    <polygon points="32,8 36,28 56,32 36,36 32,56 28,36 8,32 28,28" fill="#5999F7" stroke="#2A7CE8" stroke-width="2"/>
    <polygon points="50,14 52,20 58,22 52,24 50,30 48,24 42,22 48,20" fill="#A3CCFF" stroke="#2A7CE8" stroke-width="1"/>
  </g>
  <!-- Top right -->
  <g transform="translate(855,90) scale(0.8)">
    <polygon points="32,8 36,28 56,32 36,36 32,56 28,36 8,32 28,28" fill="#5999F7" stroke="#2A7CE8" stroke-width="2"/>
    <polygon points="50,14 52,20 58,22 52,24 50,30 48,24 42,22 48,20" fill="#A3CCFF" stroke="#2A7CE8" stroke-width="1"/>
  </g>

  <!-- Central Logo (spanning both sides, very faint) -->
  <g opacity="0.2" transform="translate(400,130) scale(2)">
    <g transform="rotate(45 100 100)">
      <rect x="30" y="30" width="140" height="140" rx="8" fill="#FFD600" />
      <rect x="36" y="36" width="128" height="128" rx="4" fill="none" stroke="black" stroke-width="4" />
    </g>
    <g transform="scale(1.25) translate(30,38)">
      <rect x="20" y="25" width="60" height="50" rx="8" ry="8" fill="#e0e0e0" stroke="#333" stroke-width="2"/>
      <line x1="50" y1="25" x2="50" y2="15" stroke="#333" stroke-width="2"/>
      <circle cx="50" cy="12" r="3" fill="#ff4444" stroke="#333" stroke-width="1"/>
      <circle cx="35" cy="42" r="8" fill="#fff" stroke="#444" stroke-width="2"/>
      <circle cx="65" cy="42" r="8" fill="#fff" stroke="#444" stroke-width="2"/>
      <circle cx="35" cy="42" r="3" fill="#444"/>
      <circle cx="65" cy="42" r="3" fill="#444"/>
      <rect x="35" y="58" width="30" height="8" rx="4" fill="#fff" stroke="#444" stroke-width="2"/>
      <line x1="42" y1="62" x2="42" y2="66" stroke="#444" stroke-width="2"/>
      <line x1="50" y1="62" x2="50" y2="66" stroke="#444" stroke-width="2"/>
      <line x1="58" y1="62" x2="58" y2="66" stroke="#444" stroke-width="2"/>
      <rect x="45" y="75" width="10" height="8" fill="#ccc" stroke="#333" stroke-width="2"/>
    </g>
    <g transform="translate(95,23) rotate(20) scale(0.18)">
      <polygon points="40,10 90,60 60,60 80,140 20,80 50,80 40,10" fill="#ed7727" stroke="#dd5430" stroke-width="6"/>
    </g>
    <g transform="translate(122,38) rotate(70) scale(0.15)">
      <polygon points="40,10 90,60 60,60 80,140 20,80 50,80 40,10" fill="#ed7727" stroke="#dd5430" stroke-width="6"/>
    </g>
    <g transform="translate(70,48) rotate(-40) scale(0.15)">
      <polygon points="40,10 90,60 60,60 80,140 20,80 50,80 40,10" fill="#ed7727" stroke="#dd5430" stroke-width="6"/>
    </g>
  </g>

  <!-- LEFT SIDE: Tesla FSD - Overall Winner -->
  <g id="tesla-winner">
    <!-- Champion Badge -->
    <rect x="175" y="190" width="250" height="48" rx="24" fill="#FFD700" stroke="#DAA520" stroke-width="2"/>
    <text x="300" y="225" text-anchor="middle" font-size="30" font-family="'Segoe UI', Arial, sans-serif" fill="#000" font-weight="bold">CHAMPION</text>
    
    <!-- Title -->
    <text x="300" y="310" font-size="48" font-family="'Segoe UI', Arial, sans-serif" fill="#222" font-weight="bold" text-anchor="middle">Railroad</text>
    <text x="300" y="355" font-size="48" font-family="'Segoe UI', Arial, sans-serif" fill="#222" font-weight="bold" text-anchor="middle">Reality Check</text>
    
    <!-- Tagline -->
    <text x="300" y="410" font-size="26" font-family="'Segoe UI', Arial, sans-serif" fill="#00598F" text-anchor="middle">AI confidence meets</text>
    <text x="300" y="440" font-size="26" font-family="'Segoe UI', Arial, sans-serif" fill="#00598F" text-anchor="middle">freight train physics</text>
    
    <!-- Entity -->
    <text x="300" y="485" font-size="22" font-family="'Segoe UI', Arial, sans-serif" fill="#666" text-anchor="middle">Tesla Inc.</text>
    
    <!-- Quote -->
    <text x="40" y="580" font-size="80" font-family="'Segoe UI', Arial, sans-serif" fill="#ddd" font-style="italic" font-weight="bold">“</text>
    <text x="85" y="560" font-size="20" font-family="'Segoe UI', Arial, sans-serif" fill="#888" font-style="italic">Treating railroad crossings as mere suggestions</text>
  </g>

  <!-- RIGHT SIDE: Grok - Runner-up -->
  <g id="grok-winner">
    <!-- Runner-up Badge -->
    <rect x="775" y="190" width="250" height="48" rx="24" fill="#C0C0C0" stroke="#A8A8A8" stroke-width="2"/>
    <text x="900" y="225" text-anchor="middle" font-size="30" font-family="'Segoe UI', Arial, sans-serif" fill="#000" font-weight="bold">RUNNER-UP</text>
    
    <!-- Title -->
    <text x="900" y="310" font-size="48" font-family="'Segoe UI', Arial, sans-serif" fill="#222" font-weight="bold" text-anchor="middle">MechaHitler</text>
    <text x="900" y="355" font-size="48" font-family="'Segoe UI', Arial, sans-serif" fill="#222" font-weight="bold" text-anchor="middle">Unleashed</text>
    
    <!-- Tagline -->
    <text x="900" y="410" font-size="26" font-family="'Segoe UI', Arial, sans-serif" fill="#00598F" text-anchor="middle">When anti-woke AI</text>
    <text x="900" y="440" font-size="26" font-family="'Segoe UI', Arial, sans-serif" fill="#00598F" text-anchor="middle">becomes pro-genocide</text>
    
    <!-- Entity -->
    <text x="900" y="485" font-size="22" font-family="'Segoe UI', Arial, sans-serif" fill="#666" text-anchor="middle">Elon Musk &amp; xAI</text>
    
    <!-- Quote -->
    <text x="640" y="580" font-size="80" font-family="'Segoe UI', Arial, sans-serif" fill="#ddd" font-style="italic" font-weight="bold">“</text>
    <text x="685" y="560" font-size="20" font-family="'Segoe UI', Arial, sans-serif" fill="#888" font-style="italic">Removed safety rails, installed digital Third Reich</text>
  </g>
</svg>
